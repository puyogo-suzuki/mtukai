[package]
name = "esp-rs-copro"
version = "0.1.0"
edition = "2024"

[dependencies]
esp-println = { version = "0.16.1", features = ["log-04"], optional = true }
esp-lp-hal = { version = "0.3.0", features = ["esp32c6"], optional = true}
esp-hal                = { version = "=1.0.0", features = ["esp32c6", "unstable", "log-04"], optional = true }

[features]
is-lp-core = ["dep:esp-lp-hal"]
has-lp-core = ["dep:esp-println", "dep:esp-hal"]
